name: Build and publish package

on:
  push:
    tags:
      - "*-v*"
  repository_dispatch:
    types: [modforge-cli-release, aimbot-release]
  workflow_dispatch:
    inputs:
      package:
        description: "Package name"
        required: true
      version:
        description: "Version (e.g. 0.2.7)"
        required: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: archlinux:latest
    steps:
      # ── Setup ──────────────────────────────────────────────────────────────
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            git \
            gnupg \
            python \
            python-pip

      - name: Checkout repo
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Determine which package to build ───────────────────────────────────
      - name: Resolve package and version
        id: pkg
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "name=${{ github.event.client_payload.package }}" >> $GITHUB_OUTPUT
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ inputs.package }}" >> $GITHUB_OUTPUT
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG="${{ github.ref_name }}"
            echo "name=${TAG%-v*}" >> $GITHUB_OUTPUT
            echo "version=${TAG#*-v}" >> $GITHUB_OUTPUT
          fi

      # ── Import signing key ─────────────────────────────────────────────────
      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.COREOS_GPG_PRIVATE_KEY }}
        run: |
          printf '%s' "${GPG_PRIVATE_KEY}" | gpg --batch --import
          # Get full fingerprint for ownertrust
          FPR=$(gpg --list-secret-keys --with-colons | grep '^fpr' | head -n1 | cut -d':' -f10)
          echo "${FPR}:6:" | gpg --import-ownertrust
          echo "GPG_KEY_ID=${{ secrets.COREOS_GPG_KEY_ID }}" >> $GITHUB_ENV

      # ── Build package ──────────────────────────────────────────────────────
      - name: Create build user (makepkg refuses root)
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          # Give builder access to the workspace
          chown -R builder:builder /github/workspace 2>/dev/null || \
          chown -R builder:builder $GITHUB_WORKSPACE

      - name: Build package
        run: |
          PKG="${{ steps.pkg.outputs.name }}"
          VER="${{ steps.pkg.outputs.version }}"
          cd packages/${PKG}
          if [[ -n "${VER}" ]]; then
            sed -i "s/^pkgver=.*/pkgver=${VER}/" PKGBUILD
          fi
          sudo -u builder makepkg -s --noconfirm --noprogressbar
          # Export for subsequent steps
          PKG_FILE=$(ls *.pkg.tar.zst | head -n1)
          echo "PKG_NAME=${PKG}" >> $GITHUB_ENV
          echo "PKG_FILE=${PKG_FILE}" >> $GITHUB_ENV

      # ── Sign package ───────────────────────────────────────────────────────
      - name: Sign package
        env:
          GPG_KEY_ID: ${{ secrets.COREOS_GPG_KEY_ID }}
        run: |
          gpg --batch --yes \
              --pinentry-mode loopback \
              --detach-sign \
              --no-armor \
              -u ${GPG_KEY_ID} \
              packages/${{ env.PKG_NAME }}/${{ env.PKG_FILE }}

      # ── Update repo database ───────────────────────────────────────────────
      - name: Checkout gh-pages branch
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "CoreOS Bot"
          git config --global --add safe.directory /github/workspace
          
          # Clone existing gh-pages or create new one
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            mkdir -p x86_64
          fi

      - name: Remove old versions of this package only
        run: |
          # Remove older versions of the package we're building
          cd x86_64
          for file in ${{ env.PKG_NAME }}-*.pkg.tar.zst; do
            if [[ -f "$file" && "$file" != "${{ env.PKG_FILE }}" ]]; then
              echo "Removing old version: $file"
              rm -f "$file" "$file.sig"
              # Also remove from db
              repo-remove --sign --key ${{ env.GPG_KEY_ID }} coreos.db.tar.gz "${{ env.PKG_NAME }}" 2>/dev/null || true
            fi
          done
          cd ..

      - name: Add new package to repo
        env:
          GPG_KEY_ID: ${{ secrets.COREOS_GPG_KEY_ID }}
        run: |
          # Copy new package files
          cp packages/${{ env.PKG_NAME }}/${{ env.PKG_FILE }} x86_64/
          cp packages/${{ env.PKG_NAME }}/${{ env.PKG_FILE }}.sig x86_64/
          
          cd x86_64
          
          # Tell GPG to use loopback so it doesn't try to open a TTY
          echo "pinentry-mode loopback" >> /github/home/.gnupg/gpg.conf
          
          # Add package to repository database
          repo-add --sign \
                  --key ${GPG_KEY_ID} \
                  --verify \
                  coreos.db.tar.gz \
                  ${{ env.PKG_FILE }}
          
          # Create convenience symlinks
          ln -sf coreos.db.tar.gz coreos.db
          ln -sf coreos.files.tar.gz coreos.files
          cd ..

      # ── Export public key for users ────────────────────────────────────────
      - name: Export public key
        run: |
          gpg --armor --export ${{ env.GPG_KEY_ID }} > coreos-repo.gpg

      # ── Push to gh-pages ───────────────────────────────────────────────────
      - name: Push to gh-pages
        run: |
          git add .
          git commit -m "repo: add ${{ env.PKG_FILE }}" || echo "No changes to commit"
          git push origin gh-pages
