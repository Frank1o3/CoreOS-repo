name: Build and publish package

on:
  push:
    tags:
      - '*-v*'
  repository_dispatch:
    types: [modforge-cli-release]
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name'
        required: true
      version:
        description: 'Version (e.g. 0.2.6.1)'
        required: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      # ── Setup ──────────────────────────────────────────────────────────────
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            git \
            gnupg \
            python \
            python-pip

      - name: Checkout repo
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Determine which package to build ───────────────────────────────────
      - name: Resolve package and version
        id: pkg
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "name=${{ github.event.client_payload.package }}" >> $GITHUB_OUTPUT
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ inputs.package }}" >> $GITHUB_OUTPUT
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG="${{ github.ref_name }}"
            echo "name=${TAG%-v*}" >> $GITHUB_OUTPUT
            echo "version=${TAG#*-v}" >> $GITHUB_OUTPUT
          fi

      # ── Import signing key ─────────────────────────────────────────────────
      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.COREOS_GPG_PRIVATE_KEY }}
        run: |
          printf '%s' "${GPG_PRIVATE_KEY}" | gpg --batch --import
          # Get full fingerprint for ownertrust
          FPR=$(gpg --list-secret-keys --with-colons | grep '^fpr' | head -n1 | cut -d':' -f10)
          echo "${FPR}:6:" | gpg --import-ownertrust
          echo "GPG_KEY_ID=${{ secrets.COREOS_GPG_KEY_ID }}" >> $GITHUB_ENV

      # ── Build package ──────────────────────────────────────────────────────
      - name: Create build user (makepkg refuses root)
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          # Give builder access to the workspace
          chown -R builder:builder /github/workspace 2>/dev/null || \
          chown -R builder:builder $GITHUB_WORKSPACE

      - name: Build package
        run: |
          PKG="${{ steps.pkg.outputs.name }}"
          VER="${{ steps.pkg.outputs.version }}"
          cd packages/${PKG}
          # Update pkgver dynamically if version was passed
          if [[ -n "${VER}" ]]; then
            sed -i "s/^pkgver=.*/pkgver=${VER}/" PKGBUILD
          fi
          sudo -u builder makepkg -s --noconfirm --noprogressbar

      # ── Sign package ───────────────────────────────────────────────────────
      - name: Sign package
        run: |
          cd packages/${{ env.PKG_NAME }}
          gpg --batch --yes \
              --detach-sign \
              --no-armor \
              -u ${{ env.GPG_KEY_ID }} \
              ${{ env.PKG_FILE }}

      # ── Update repo database ───────────────────────────────────────────────
      - name: Checkout gh-pages branch
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "CoreOS Bot"
          # Get or create gh-pages branch content
          git fetch origin gh-pages 2>/dev/null || true
          mkdir -p /tmp/repo-root/x86_64
          # Copy existing db if it exists
          git show origin/gh-pages:x86_64/coreos.db.tar.gz > /tmp/repo-root/x86_64/coreos.db.tar.gz 2>/dev/null || true
          git show origin/gh-pages:x86_64/coreos.files.tar.gz > /tmp/repo-root/x86_64/coreos.files.tar.gz 2>/dev/null || true

      - name: Add package to repo database
        run: |
          # Copy built package and sig to repo
          cp packages/${{ env.PKG_NAME }}/${{ env.PKG_FILE }} /tmp/repo-root/x86_64/
          cp packages/${{ env.PKG_NAME }}/${{ env.PKG_FILE }}.sig /tmp/repo-root/x86_64/
          # Update the database
          cd /tmp/repo-root/x86_64
          repo-add --sign \
                   --key ${{ env.GPG_KEY_ID }} \
                   --verify \
                   coreos.db.tar.gz \
                   ${{ env.PKG_FILE }}
          # Create symlinks (pacman expects both db and db.tar.gz)
          ln -sf coreos.db.tar.gz coreos.db
          ln -sf coreos.files.tar.gz coreos.files

      # ── Export public key for users ────────────────────────────────────────
      - name: Export public key
        run: |
          gpg --armor --export ${{ env.GPG_KEY_ID }} > /tmp/repo-root/coreos-repo.gpg

      # ── Push to gh-pages ───────────────────────────────────────────────────
      - name: Push to gh-pages
        run: |
          cd /tmp/repo-root
          git init
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git checkout -b gh-pages
          git add .
          git commit -m "repo: add ${{ env.PKG_FILE }}"
          git push origin gh-pages --force
